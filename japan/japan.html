<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    
    <script src="https://unpkg.com/ml5@1.2.0/dist/ml5.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f5f2eb;
        }
    </style>
</head>

<body>

    <script src="japan.js"></script>
    
    <div class="caption-container">
        <h1 class="caption-title">JAPAN — 静寂の波紋</h1>
        <p class="caption-text">
            そっと目を閉じ、耳を澄ませる。<br>
            あなたの呼吸が水墨の滴となり、静かな和紙の世界を描き出す。
        </p>
        <span class="caption-sub">* 画面をクリックするとworld mapに戻ります</span>
    </div>

    <style>
    .caption-container {
        position: absolute;
        bottom: 40px; /* 画面の下から40pxの位置 */
        left: 40px;   /* 画面の左から40pxの位置 */
        color: rgba(30, 30, 30, 0.8); 
        font-family: "Noto Serif JP", "ヒラギノ明朝 ProN", "MS 明朝", serif; /* 明朝体 */
        z-index: 10;  /* キャンバスより手前に表示 */
        pointer-events: none; /* 文字がマウスクリックを邪魔しないようにする */
    }
    .caption-title {
        font-size: 20px;
        font-weight: normal;
        letter-spacing: 0.1em; /* 文字の間隔を少し広げて上品に */
        margin-bottom: 10px;
    }
    .caption-text {
        font-size: 13px;
        line-height: 1.8;
        margin-bottom: 15px;
    }
    .caption-sub {
        font-size: 11px;
        opacity: 0.6;
    }
    </style>

</body>
</html>
